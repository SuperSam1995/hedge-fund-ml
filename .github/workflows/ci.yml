name: CI
on: [pull_request, push]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Lint smoke test
        run: uv run --group dev ruff check tests/test_ci_smoke.py
      - name: Pytest smoke
        run: uv run --group dev pytest -q tests/test_ci_smoke.py
