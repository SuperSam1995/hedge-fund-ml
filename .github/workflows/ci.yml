name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
      - name: Sync dependencies
        run: uv sync --group dev --extra deep-learning
      - name: Ruff
        run: uv run --group dev ruff check src tests
      - name: Black
        run: uv run --group dev black --check src tests
      - name: Mypy
        run: uv run --group dev mypy src tests
      - name: Pytest
        run: uv run --group dev --extra deep-learning pytest -q

  report-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
      - run: uv sync --group dev
      - name: Prepare minimal inputs
        run: |
          mkdir -p reports/figures
          echo '{"Sharpe":0.0,"Sortino":0.0}' > reports/metrics_latest.json
          python - <<'PY'
from matplotlib import pyplot as plt
import numpy as np, pathlib
p = pathlib.Path("reports/figures/replication_cumulative.png")
plt.plot(np.arange(10), np.cumsum(np.random.randn(10)))
plt.title("Smoke Cumulative Return")
plt.tight_layout()
plt.savefig(p, dpi=120)
PY
      - name: Build report from text-only notebook
        run: |
          uv run --group dev jupytext --to ipynb notebooks/final_report.py -o reports/_tmp_smoke.ipynb
          uv run --group dev papermill reports/_tmp_smoke.ipynb reports/_exec_smoke.ipynb \
            -p metrics_path reports/metrics_latest.json -p figures_dir reports/figures
          uv run --group dev jupyter nbconvert --to html --no-input reports/_exec_smoke.ipynb \
            --output reports/final_report_smoke.html
      - name: Assert HTML produced
        run: test -f reports/final_report_smoke.html

  bundle-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Reproduce CPU pipeline
        run: make reproduce_cpu
      - name: Build bundle
        run: make bundle
      - name: Assert bundle index
        run: test -f $(ls -td reports/bundle/* | head -1)/index.md
      - name: Capture bundle path
        run: echo "BUNDLE_DIR=$(ls -td reports/bundle/* | head -1)" >> "$GITHUB_ENV"
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle
          path: ${{ env.BUNDLE_DIR }}
