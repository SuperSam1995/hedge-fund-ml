name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
      - name: Sync dependencies
        run: uv sync --group dev --extra deep-learning
      - name: Ruff
        run: uv run --group dev ruff check src tests
      - name: Black
        run: uv run --group dev black --check src tests
      - name: Mypy
        run: uv run --group dev mypy src tests
      - name: Pytest
        run: uv run --group dev --extra deep-learning pytest -q

  report-smoke:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
      - name: Sync dependencies
        run: uv sync --group dev
      - name: Prepare smoke artefacts
        run: |
          mkdir -p reports/figures
          python - <<'PY'
from pathlib import Path
import json
import matplotlib.pyplot as plt

metrics = {
    "sharpe_ratio": 0.0,
    "max_drawdown": -0.01,
    "annual_return": 0.05,
}

Path("reports").mkdir(exist_ok=True)
with open("reports/metrics_smoke.json", "w", encoding="utf-8") as fh:
    json.dump(metrics, fh)

fig_path = Path("reports/figures/smoke.png")
plt.figure()
plt.plot([0, 1], [0, 1], label="pnl")
plt.xlabel("time")
plt.ylabel("value")
plt.legend()
plt.tight_layout()
plt.savefig(fig_path, dpi=120)
PY
      - name: Run papermill smoke
        run: uv run --group dev papermill notebooks/final_report.ipynb reports/_tmp_smoke.ipynb \
          -p metrics_path reports/metrics_smoke.json \
          -p figures_dir reports/figures
      - name: Convert smoke report
        run: uv run --group dev jupyter nbconvert --to html --no-input reports/_tmp_smoke.ipynb \
          --output reports/final_report_smoke.html
      - name: Assert HTML produced
        run: test -f reports/final_report_smoke.html
