seed: 42
packages: ["numpy", "pandas", "cvxpy"]
paths:
  itrafo_forecast_csv: data/interim/itrafo_forecast.csv
  etf_forecast_csv: data/interim/etf_forecast.csv
  weights_csv: results/tables/replication_weights_itrafo.csv
  series_csv: results/tables/replication_series_itrafo.csv
  metadata_json: results/logs/replication_metadata_itrafo.json
cols:
  date: date
  strategy: strategy
  yhat: yhat
  etfs: [SPY, TLT, IWM, EFA, EEM, HYG, LQD, GLD, DBC, VNQ]
hyper:
  leverage: 1.0
  lambda_to: 0.005
  lambda_l2: 0.001
  long_only: false
  solver: OSQP
  solver_opts:
    eps_abs: 1.0e-06
    eps_rel: 1.0e-06
    max_iter: 20000
